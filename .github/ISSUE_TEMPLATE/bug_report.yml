name: Bug report
description: Report a reproducible problem in LearnDeck
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve LearnDeck. Please keep reports free of learner data, workspace paths, and SQLite contents.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you were doing when it occurred.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Exact steps to reproduce
      description: List the smallest reliable sequence of steps.
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Paste the output of `bun --version`.
      placeholder: 1.3.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: dropdown
    id: ai-guide
    attributes:
      label: Which AI guide was involved?
      description: Choose Not applicable when no guide was involved.
      options:
        - Not applicable
        - Codex
        - Cursor
        - Claude Code
        - Other
    validations:
      required: true
  - type: checkboxes
    id: learner-data
    attributes:
      label: Learner-data check
      options:
        - label: I confirm that this report does not paste learner answers, workspace paths, SQLite contents, or other learner data.
          required: true
